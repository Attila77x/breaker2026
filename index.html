<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>BREAKER — 1993 / web edition</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="stage">
  <div id="gamewrap">
    <canvas id="field"></canvas>
    <div id="panel">
      <div class="plogo">BREAKER</div>
      <div class="prow"><span>Level</span><b id="h-level">-</b></div>
      <div class="prow"><span>Player</span><b id="h-player">1</b></div>
      <div class="prow"><span>Score</span><b id="h-score">0</b></div>
      <div class="prow"><span>Bricks</span><b id="h-bricks">-</b></div>
      <div class="prow"><span>Balls</span><b id="h-balls">-</b></div>
      <div class="prow"><span>Lives</span><b id="h-lives">8</b></div>
      <div class="prow"><span>Range</span><b id="h-range">Beginner</b></div>
      <div class="prow"><span>Shoot</span><b id="h-shoot">No</b></div>
      <div class="psep"></div>
      <div class="prow"><span>Sound</span><b id="h-sound">On</b></div>
      <div class="prow"><span>Music</span><b id="h-music">Off</b></div>
      <div id="demobadge">DEMO</div>
      <div class="pfoot">Program by Tátyó<br>1993 &middot; web 2026</div>
    </div>
    <div id="overlays"></div>
  </div>
</div>
<script src="maps.js"></script>
<script src="music.js"></script>
<script src="game.js"></script>
</body>
</html>
